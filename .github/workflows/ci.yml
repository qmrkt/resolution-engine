name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go test ./...
      - name: Fuzz CEL evaluator
        run: go test -fuzz=FuzzEvalCondition$ -fuzztime=10s ./dag/
      - name: Fuzz JSON extractor
        run: go test -fuzz=FuzzExtractJSON$ -fuzztime=10s ./executors/
      - name: Fuzz JSON path
        run: go test -fuzz=FuzzJSONPathExtract -fuzztime=10s ./executors/
